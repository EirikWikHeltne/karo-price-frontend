<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Left panel - dark green -->
  <rect x="0" y="0" width="480" height="630" fill="#1e3a2f"/>

  <!-- Right panel - beige -->
  <rect x="480" y="0" width="720" height="590" fill="#f0ebe0"/>

  <!-- Bottom bar -->
  <rect x="480" y="590" width="720" height="40" fill="#1e3a2f"/>

  <!-- Barcode lines on left panel -->
  <g fill="#f5f0e8" opacity="0.85">
    <rect x="130" y="120" width="10" height="220" rx="2"/>
    <rect x="150" y="120" width="5" height="220" rx="1"/>
    <rect x="165" y="120" width="12" height="220" rx="2"/>
    <rect x="187" y="120" width="5" height="220" rx="1"/>
    <rect x="202" y="120" width="10" height="220" rx="2"/>
    <rect x="222" y="120" width="15" height="220" rx="2"/>
    <rect x="247" y="120" width="5" height="220" rx="1"/>
    <rect x="262" y="120" width="10" height="220" rx="2"/>
    <rect x="282" y="120" width="5" height="220" rx="1"/>
    <rect x="297" y="120" width="12" height="220" rx="2"/>
    <rect x="319" y="120" width="5" height="220" rx="1"/>
    <rect x="334" y="120" width="10" height="220" rx="2"/>
  </g>

  <!-- PS text on left panel -->
  <text x="240" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="100" fill="#f5f0e8">PS</text>

  <!-- Gold scan line on left panel -->
  <line x1="100" y1="380" x2="380" y2="380" stroke="#c5a03f" stroke-width="6" stroke-linecap="round"/>
  <circle cx="100" cy="380" r="10" fill="#c5a03f"/>
  <circle cx="380" cy="380" r="10" fill="#c5a03f"/>

  <!-- Right panel text -->
  <text x="560" y="210" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="72" fill="#1e3a2f">Pris</text>
  <text x="560" y="290" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="#c5a03f">Scanner</text>

  <!-- Teal divider line -->
  <line x1="560" y1="310" x2="780" y2="310" stroke="#6a8a7a" stroke-width="3"/>

  <!-- Description text -->
  <text x="560" y="370" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#4a5a4a">Sammenlign apotekpriser</text>
  <text x="560" y="415" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#4a5a4a">på tvers av norske apotek.</text>

  <!-- Gold cross/plus icon -->
  <g transform="translate(880, 440)">
    <rect x="-6" y="-25" width="12" height="50" rx="4" fill="#c5a03f"/>
    <rect x="-25" y="-6" width="50" height="12" rx="4" fill="#c5a03f"/>
  </g>

  <!-- Bottom bar text -->
  <text x="600" y="618" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8a9a72" letter-spacing="3">PRISSCANNER</text>
  <circle cx="715" cy="613" r="3" fill="#8a9a72"/>
  <text x="735" y="618" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8a9a72" letter-spacing="3">APOTEK</text>
</svg>
