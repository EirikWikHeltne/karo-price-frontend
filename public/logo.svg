<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#1e3a2f"/>

  <!-- Barcode lines -->
  <g fill="#f5f0e8" opacity="0.9">
    <rect x="176" y="100" width="8" height="160" rx="2"/>
    <rect x="192" y="100" width="4" height="160" rx="1"/>
    <rect x="204" y="100" width="10" height="160" rx="2"/>
    <rect x="222" y="100" width="4" height="160" rx="1"/>
    <rect x="234" y="100" width="8" height="160" rx="2"/>
    <rect x="250" y="100" width="12" height="160" rx="2"/>
    <rect x="270" y="100" width="4" height="160" rx="1"/>
    <rect x="282" y="100" width="8" height="160" rx="2"/>
    <rect x="298" y="100" width="4" height="160" rx="1"/>
    <rect x="310" y="100" width="10" height="160" rx="2"/>
    <rect x="328" y="100" width="4" height="160" rx="1"/>
    <rect x="340" y="100" width="8" height="160" rx="2"/>
  </g>

  <!-- Gold horizontal scan line -->
  <line x1="150" y1="200" x2="362" y2="200" stroke="#c5a03f" stroke-width="5" stroke-linecap="round"/>
  <circle cx="150" cy="200" r="8" fill="#c5a03f"/>
  <circle cx="362" cy="200" r="8" fill="#c5a03f"/>

  <!-- PS text -->
  <text x="256" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="80" fill="#f5f0e8">PS</text>

  <!-- PRISSCANNER text -->
  <text x="256" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="28" fill="#8a9a72" letter-spacing="4">PRISSCANNER</text>
</svg>
